name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  NODE_VERSION: '20'

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check clear-manifest impact
        if: github.event_name == 'pull_request'
        id: clear_check
        continue-on-error: true
        run: node scripts/check-clear-manifest.js origin/${{ github.base_ref }}

      - name: Comment clear-manifest warning
        if: github.event_name == 'pull_request' && steps.clear_check.outputs.has_warning == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.clear_check.outputs.clear_warning }}`;
            // Check for existing comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Clear-Site-Data Warning')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      # - name: Svelte check
      #   run: pnpm check

      - name: Unit tests
        run: pnpm test -- --run

      - name: Build
        run: pnpm build

      - name: Strip source maps
        run: find dist -name '*.map' -delete

      - name: Install Playwright browsers
        if: github.event_name == 'pull_request'
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        if: github.event_name == 'pull_request'
        run: pnpm test:e2e
