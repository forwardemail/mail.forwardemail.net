name: CI

on:
  push:
    branches: [main]
  pull_request:

# Default to no permissions; broaden only per-job
permissions: {}

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  build-test:
    # Skip CI on release commits — release.yml handles builds and deploy.
    # `np` creates commits like "chore(release): 0.9.6" plus a matching tag,
    # and pushes both — the branch push would otherwise trigger a duplicate CI run.
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Check clear-manifest impact
        if: github.event_name == 'pull_request'
        id: clear_check
        continue-on-error: true
        run: node scripts/check-clear-manifest.js origin/${{ github.base_ref }}

      - name: Comment clear-manifest warning
        if: github.event_name == 'pull_request' && steps.clear_check.outputs.has_warning == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const body = `${{ steps.clear_check.outputs.clear_warning }}`;
            // Check for existing comment to avoid duplicates
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('Clear-Site-Data Warning')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate || true

      - name: Lint
        run: pnpm lint

      - name: Format
        run: pnpm format

      # - name: Svelte check
      #   run: pnpm check

      - name: Unit tests
        run: pnpm test -- --run

      - name: Build
        run: pnpm build

      - name: Strip source maps
        run: find dist -name '*.map' -delete

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium webkit

      - name: E2E tests
        run: pnpm test:e2e

  # Pre-merge secret scan. Catches accidentally-committed tokens, signing
  # keys, etc. before they hit main. Scoped to repo content only; no signing
  # secrets needed. continue-on-error: false — fail the PR if anything is
  # found so it has to be remediated (rotated + history-rewritten) before
  # merge, not flagged-and-merged.
  secret-scan:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2
        env:
          # GITLEAKS_LICENSE is optional for org/private repos; public repos
          # work without it. The action no-ops if the license is invalid.
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
