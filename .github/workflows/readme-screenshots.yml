name: README screenshots

on:
  workflow_call:
    inputs:
      base_url:
        description: 'Mail deployment to capture'
        required: false
        default: 'https://mail.forwardemail.net'
        type: string
      dry_run:
        description: 'Capture and validate without committing changes'
        required: false
        default: false
        type: boolean
      source_ref:
        description: 'Repository ref containing the screenshot generator'
        required: false
        default: 'main'
        type: string
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Mail deployment to capture'
        required: false
        default: 'https://mail.forwardemail.net'
        type: string
      dry_run:
        description: 'Capture and validate without committing changes'
        required: false
        default: false
        type: boolean
      source_ref:
        description: 'Repository ref containing the screenshot generator'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write

concurrency:
  group: readme-screenshots-${{ inputs.source_ref || github.ref }}
  cancel-in-progress: false

jobs:
  capture:
    name: Capture and publish README screenshots
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCREENSHOT_BASE_URL: ${{ inputs.base_url }}
      SCREENSHOT_DRY_RUN: ${{ inputs.dry_run && 'true' || 'false' }}
    steps:
      - name: Check out the requested source revision
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          ref: ${{ inputs.source_ref }}
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture production screenshots and update the README gallery
        run: |
          set -euo pipefail
          args=(--base-url "$SCREENSHOT_BASE_URL")
          if [[ "$SCREENSHOT_DRY_RUN" == 'true' ]]; then
            args+=(--dry-run)
          fi
          pnpm screenshots:readme "${args[@]}"

      - name: Format generated README Markdown
        if: ${{ !inputs.dry_run }}
        run: pnpm exec prettier README.md --write

      - name: Validate the complete README screenshot set
        run: |
          set -euo pipefail
          if [[ "$SCREENSHOT_DRY_RUN" == 'true' ]]; then
            screenshot_root='.readme-screenshot-preview/docs/screenshots'
          else
            screenshot_root='docs/screenshots'
          fi

          screenshot_count=$(find "$screenshot_root" -type f -name '*.jpg' | wc -l | tr -d ' ')
          if [[ "$screenshot_count" != '64' ]]; then
            echo "::error::Expected 64 screenshots, found $screenshot_count"
            exit 1
          fi

          if [[ "$SCREENSHOT_DRY_RUN" == 'true' ]]; then
            exit 0
          fi

          start_count=$(grep -c '<!-- readme-screenshots:start -->' README.md || true)
          end_count=$(grep -c '<!-- readme-screenshots:end -->' README.md || true)
          if [[ "$start_count" != '1' || "$end_count" != '1' ]]; then
            echo '::error::README screenshot markers must each appear exactly once'
            exit 1
          fi

          missing_reference=0
          while IFS= read -r image; do
            if ! grep -Fq "($image)" README.md; then
              echo "::error::README does not reference $image"
              missing_reference=1
            fi
          done < <(find docs/screenshots -type f -name '*.jpg' | sort)

          readme_reference_count=$(grep -oE 'docs/screenshots/[^)]+\.jpg' README.md | sort -u | wc -l | tr -d ' ')
          if [[ "$readme_reference_count" != '64' ]]; then
            echo "::error::Expected 64 unique README screenshot references, found $readme_reference_count"
            missing_reference=1
          fi

          if [[ "$missing_reference" != '0' ]]; then
            exit 1
          fi

      - name: Commit README.md and docs/screenshots to main
        if: ${{ !inputs.dry_run }}
        env:
          SCREENSHOT_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- README.md docs/screenshots)" ]]; then
            echo 'No README screenshot changes were generated.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md docs/screenshots

          if git diff --cached --quiet; then
            echo 'No complete screenshot update is available to commit.'
            exit 0
          fi

          git commit -m 'docs: refresh release screenshots [skip ci]' \
            -m "Generated by ${SCREENSHOT_RUN_URL}"
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Summarize README screenshot publication
        run: |
          {
            echo '### README screenshots passed'
            echo
            echo 'All 64 production screenshots were captured and validated.'
            if [[ "$SCREENSHOT_DRY_RUN" == 'true' ]]; then
              echo 'Dry-run mode made no repository changes.'
            else
              echo 'The generated image files and README gallery were committed to `main` when changes were present.'
            fi
          } >> "$GITHUB_STEP_SUMMARY"
