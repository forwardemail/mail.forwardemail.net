name: Refresh README screenshots

on:
  workflow_run:
    workflows:
      - Release
    types:
      - completed
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Mail deployment to capture'
        required: false
        default: 'https://mail.forwardemail.net'
        type: string
      dry_run:
        description: 'Capture and validate without committing changes'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: readme-screenshots
  cancel-in-progress: false

jobs:
  refresh:
    name: Capture and publish README screenshots
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_repository.full_name == github.repository)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      SCREENSHOT_BASE_URL: ${{ inputs.base_url || 'https://mail.forwardemail.net' }}
    steps:
      - name: Check out the latest default branch
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@a3252b78c470c02df07e9d59298aecedc3ccdd6d # v3.0.0
        with:
          version: 9.15.9

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Capture and validate production screenshots
        id: capture
        continue-on-error: true
        run: |
          args=(--base-url "$SCREENSHOT_BASE_URL")
          if [[ "${{ inputs.dry_run || false }}" == 'true' ]]; then
            args+=(--dry-run)
          fi
          pnpm screenshots:readme -- "${args[@]}"

      - name: Explain skipped update
        if: steps.capture.outcome != 'success'
        run: |
          echo '::warning::README screenshots were not updated because production validation or capture failed.'
          {
            echo '### README screenshots were skipped'
            echo
            echo 'The production validation or screenshot capture failed. No README or screenshot assets were committed.'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit a complete screenshot set
        if: >-
          steps.capture.outcome == 'success' &&
          (github.event_name != 'workflow_dispatch' || inputs.dry_run != true)
        env:
          RELEASE_RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id || github.run_id }}
        run: |
          if git diff --quiet -- README.md docs/screenshots; then
            echo 'No README screenshot changes were generated.'
            exit 0
          fi

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add README.md docs/screenshots

          if git diff --cached --quiet; then
            echo 'No complete screenshot update is available to commit.'
            exit 0
          fi

          git commit -m 'docs: refresh release screenshots [skip ci]' \
            -m "Generated after ${RELEASE_RUN_URL}"

          if ! git push origin HEAD:main; then
            echo '::warning::The screenshot commit was not pushed because main changed concurrently.'
            echo 'No repository content was modified by this workflow run.' >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          echo 'The README screenshot gallery was refreshed successfully.' >> "$GITHUB_STEP_SUMMARY"

      - name: Summarize a manual dry run
        if: >-
          steps.capture.outcome == 'success' &&
          github.event_name == 'workflow_dispatch' &&
          inputs.dry_run == true
        run: |
          {
            echo '### README screenshot dry run passed'
            echo
            echo 'Every required production view was captured and validated. No tracked files were changed.'
          } >> "$GITHUB_STEP_SUMMARY"
