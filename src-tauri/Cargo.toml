[package]
name = "forwardemail-desktop"
version = "0.6.7"
description = "Forward Email - Privacy-focused email client"
authors = ["Forward Email <support@forwardemail.net>"]
license = "BUSL-1.1"
repository = "https://github.com/forwardemail/mail.forwardemail.net"
edition = "2021"

[lib]
name = "forwardemail_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2.5.6", features = [] }

[dependencies]
tauri = { version = "2.10.3", features = [
  "tray-icon",
  "image-png",
  "devtools",
] }
tauri-plugin-notification = "2.3.3"
tauri-plugin-deep-link = "2.4.7"
tauri-plugin-process = "2.3.1"
tauri-plugin-opener = "2.5.3"
tauri-plugin-log = "2.8.0"
tauri-plugin-os = "2.3.2"
tauri-plugin-dialog = "2.6.0"
tauri-plugin-fs = "2.4.5"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
log = "0.4"

# Desktop-only plugins (not available on Android/iOS)
[target.'cfg(not(any(target_os = "android", target_os = "ios")))'.dependencies]
tauri-plugin-single-instance = "2.4.0"
tauri-plugin-window-state = "2.4.1"
tauri-plugin-updater = "2.10.0"
tauri-plugin-global-shortcut = "2.3.1"

# macOS-only: Objective-C bindings for dock badge
[target.'cfg(target_os = "macos")'.dependencies]
objc = "0.2"

[profile.release]
panic = "abort"
codegen-units = 1
lto = true
opt-level = "s"
strip = true
